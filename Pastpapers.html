<!DOCTYPE html>
<html>
<head>
<title>A/L ICT Past Papers & Performance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:Arial;
  background:#f4f6f8;
  padding:20px;
}

h1{
  text-align:center;
}

.paper{
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:8px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

button{
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:14px;
}

.qbtn{background:#3498db;color:white;}
.mbtn{background:#2ecc71;color:white;}
.savebtn{background:#e67e22;color:white;}
.clearbtn{background:#e74c3c;color:white;}

input{
  padding:6px;
  width:60px;
  text-align:center;
}

#chartContainer{
  max-width:600px;
  margin:40px auto;
}

#average{
  text-align:center;
  font-size:18px;
  margin-top:10px;
}

</style>

<script>

let years=[2025,2024,2023,2022,2021];

function saveMark(year){

  let mark=document.getElementById("mark"+year).value;

  if(mark<0 || mark>100){
    alert("Enter mark between 0 - 100");
    return;
  }

  localStorage.setItem("ict"+year,mark);

  drawChart();
}

function loadMarks(){

  years.forEach(function(y){

    let m=localStorage.getItem("ict"+y);

    if(m){
      document.getElementById("mark"+y).value=m;
    }

  });

  drawChart();
}

function clearMarks(){

  years.forEach(function(y){
    localStorage.removeItem("ict"+y);
    document.getElementById("mark"+y).value="";
  });

  drawChart();
}

function drawChart(){

  let marks=[];
  let total=0;
  let count=0;

  years.forEach(function(y){

    let m=localStorage.getItem("ict"+y);

    if(m){
      marks.push(parseInt(m));
      total+=parseInt(m);
      count++;
    }else{
      marks.push(0);
    }

  });

  let avg=count?Math.round(total/count):0;

  document.getElementById("average").innerHTML="Average Mark : "+avg+"%";

  let color = avg>=75 ? "#2ecc71" : avg>=50 ? "#f1c40f" : "#e74c3c";

  const ctx=document.getElementById("myChart").getContext("2d");

  if(window.bar!=undefined) window.bar.destroy();

  window.bar=new Chart(ctx,{

    type:"bar",

    data:{
      labels:years,
      datasets:[{
        label:"Marks",
        data:marks,
        backgroundColor:color
      }]
    },

    options:{
      scales:{
        y:{
          beginAtZero:true,
          max:100
        }
      },
      plugins:{
        legend:{display:false},
        title:{
          display:true,
          text:"A/L ICT Past Paper Performance"
        }
      }
    }

  });

}

</script>

</head>
